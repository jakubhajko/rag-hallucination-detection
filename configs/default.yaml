# Default configuration for the SGI Evaluation Pipeline
experiment_name: "halueval_baseline"

dataset:
  name: "HaluEval"
  n_samples: 5000
  hallucination_prob: 0.5

model:
  # Supported: mpnet, minilm, bge, e5, gte
  key: "bge" 

pipeline:
  # Defines how predictions are made. Options: "youden" or "f1"
  threshold_method: "youden"